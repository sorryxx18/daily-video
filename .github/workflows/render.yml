name: Render Video

on:
  workflow_dispatch:
    inputs:
      raw_text:
        description: '原始文字內容'
        required: true
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install edge-tts requests google-generativeai

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Node deps
        run: bun install

      - name: Generate segments with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RAW_TEXT: ${{ inputs.raw_text }}
        run: |
          python scripts/generate_segments.py > /tmp/ai_output.json
          echo "CATEGORY=$(python3 -c "import json; d=json.load(open('/tmp/ai_output.json')); print(d['category'])")" >> $GITHUB_ENV
          echo "SEGMENTS_JSON=$(python3 -c "import json; d=json.load(open('/tmp/ai_output.json')); print(json.dumps(d['segments']))")" >> $GITHUB_ENV

      - name: Render video
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python scripts/render.py

      - name: Create release with video
        uses: softprops/action-gh-release@v2
        with:
          tag_name: video-${{ github.run_number }}
          name: "影片 #${{ github.run_number }}"
          files: output/video-compressed.mp4
          token: ${{ secrets.GITHUB_TOKEN }}
