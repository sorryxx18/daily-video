name: Render Video

on:
  workflow_dispatch:
    inputs:
      segments_json:
        description: 'Pre-generated segments JSON array'
        required: true
        type: string
      category:
        description: '影片類別標籤'
        required: false
        default: '📹 每日快報'
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Restore used video IDs cache
        uses: actions/cache@v4
        with:
          path: scripts/used_video_ids.json
          key: used-video-ids-${{ github.run_number }}
          restore-keys: used-video-ids-

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install edge-tts requests

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Node deps
        run: bun install

      - name: Render video
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          SEGMENTS_JSON: ${{ inputs.segments_json }}
          CATEGORY: ${{ inputs.category }}
          JAMENDO_CLIENT_ID: ${{ secrets.JAMENDO_CLIENT_ID }}
        run: python scripts/render.py

      - name: Create release with video
        uses: softprops/action-gh-release@v2
        with:
          tag_name: video-${{ github.run_number }}
          name: "影片 #${{ github.run_number }}"
          files: output/video-compressed.mp4
          token: ${{ secrets.GITHUB_TOKEN }}
