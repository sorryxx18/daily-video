<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Video Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1a1a24;
      border: 1px solid #2a2a38;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 640px;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 24px; color: #fff; }
    label { display: block; font-size: 13px; color: #8888aa; margin-bottom: 6px; margin-top: 16px; }
    textarea, select, input {
      width: 100%;
      background: #12121a;
      border: 1px solid #2a2a38;
      border-radius: 8px;
      color: #e8e8f0;
      padding: 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus, input:focus { border-color: #5555cc; }
    textarea { resize: vertical; min-height: 160px; line-height: 1.6; }
    select { cursor: pointer; }
    .row { display: flex; gap: 12px; margin-top: 16px; }
    .row > * { flex: 1; }
    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: #4444cc;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) { background: #5555dd; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status {
      margin-top: 20px;
      padding: 14px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    #status.running { background: #1a2a1a; border: 1px solid #2a4a2a; color: #88cc88; }
    #status.done    { background: #1a1a2a; border: 1px solid #3a3a6a; color: #aaaaff; }
    #status.error   { background: #2a1a1a; border: 1px solid #4a2a2a; color: #ff8888; }
    #download-link {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 20px;
      background: #225522;
      border: 1px solid #336633;
      border-radius: 8px;
      color: #88ff88;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }
    #download-link:hover { background: #336633; }
    .pat-toggle { font-size: 12px; color: #5555aa; cursor: pointer; margin-top: 4px; text-decoration: underline; }
    .hint { font-size: 12px; color: #555566; margin-top: 6px; }
  </style>
</head>
<body>
<div class="card">
  <h1>📹 Daily Video Generator</h1>

  <label>原始文字內容</label>
  <textarea id="raw-text" placeholder="貼上天氣報告、課程筆記、新聞摘要…任何文字都可以。"></textarea>

  <div class="row">
    <div>
      <label>影片風格</label>
      <select id="style">
        <option value="天氣快報">⛈️ 天氣快報</option>
        <option value="AI教學">🤖 AI教學</option>
        <option value="新聞摘要">📰 新聞摘要</option>
        <option value="一般">📹 一般</option>
      </select>
    </div>
    <div>
      <label>Repository</label>
      <input id="repo" type="text" value="calesthio/daily-video" placeholder="owner/repo">
    </div>
  </div>

  <label>GitHub Personal Access Token</label>
  <input id="pat" type="password" placeholder="ghp_xxxxxxxxxxxx">
  <div class="hint">需要 workflow + contents scope。只存在你的瀏覽器 localStorage，不會傳到任何地方。</div>
  <div class="pat-toggle" onclick="togglePat()">顯示 / 隱藏</div>

  <button id="submit-btn" onclick="submitJob()">🎬 生成影片</button>

  <div id="status"></div>
</div>

<script>
  const $ = id => document.getElementById(id);

  // Restore from localStorage
  window.onload = () => {
    const saved = localStorage.getItem('dv_pat');
    if (saved) $('pat').value = saved;
    const repo = localStorage.getItem('dv_repo');
    if (repo) $('repo').value = repo;
  };

  function togglePat() {
    const el = $('pat');
    el.type = el.type === 'password' ? 'text' : 'password';
  }

  function setStatus(msg, type) {
    const el = $('status');
    el.style.display = 'block';
    el.className = type;
    el.innerHTML = msg;
  }

  async function submitJob() {
    const rawText = $('raw-text').value.trim();
    const style = $('style').value;
    const repo = $('repo').value.trim();
    const pat = $('pat').value.trim();

    if (!rawText) return setStatus('請貼上原始文字內容。', 'error');
    if (!pat) return setStatus('請填入 GitHub PAT。', 'error');

    localStorage.setItem('dv_pat', pat);
    localStorage.setItem('dv_repo', repo);

    $('submit-btn').disabled = true;
    setStatus('⏳ 觸發 GitHub Actions...', 'running');

    const [owner, repoName] = repo.split('/');
    const triggerUrl = `https://api.github.com/repos/${owner}/${repoName}/actions/workflows/render.yml/dispatches`;

    // Record timestamp before trigger to find the run later
    const triggerTime = new Date().toISOString();

    const triggerRes = await fetch(triggerUrl, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${pat}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        ref: 'main',
        inputs: { raw_text: rawText, style: style },
      }),
    });

    if (!triggerRes.ok) {
      const err = await triggerRes.text();
      setStatus(`❌ 觸發失敗 (${triggerRes.status}): ${err}`, 'error');
      $('submit-btn').disabled = false;
      return;
    }

    setStatus('✅ 已觸發，等待 Actions 啟動...', 'running');
    await new Promise(r => setTimeout(r, 5000));
    pollRun(owner, repoName, pat, triggerTime);
  }

  async function pollRun(owner, repo, pat, triggerTime) {
    const headers = {
      'Authorization': `Bearer ${pat}`,
      'Accept': 'application/vnd.github+json',
    };

    let runId = null;
    let attempts = 0;

    // Find the run triggered after triggerTime
    while (!runId && attempts < 12) {
      attempts++;
      await new Promise(r => setTimeout(r, 5000));
      const runsRes = await fetch(
        `https://api.github.com/repos/${owner}/${repo}/actions/workflows/render.yml/runs?per_page=5`,
        { headers }
      );
      const data = await runsRes.json();
      const run = (data.workflow_runs || []).find(r =>
        new Date(r.created_at) >= new Date(triggerTime)
      );
      if (run) runId = run.id;
    }

    if (!runId) {
      setStatus('❌ 找不到對應的 Actions run，請到 GitHub Actions 頁面手動查看。', 'error');
      $('submit-btn').disabled = false;
      return;
    }

    // Poll run status
    let elapsed = 0;
    while (true) {
      elapsed += 15;
      await new Promise(r => setTimeout(r, 15000));
      const runRes = await fetch(
        `https://api.github.com/repos/${owner}/${repo}/actions/runs/${runId}`,
        { headers }
      );
      const run = await runRes.json();
      const mins = Math.floor(elapsed / 60);
      const secs = elapsed % 60;

      if (run.status === 'completed') {
        if (run.conclusion === 'success') {
          // Find the release
          await fetchLatestRelease(owner, repo, headers, runId);
        } else {
          setStatus(`❌ Actions 失敗 (${run.conclusion})。<br><a href="${run.html_url}" target="_blank" style="color:#ff8888">查看詳細</a>`, 'error');
          $('submit-btn').disabled = false;
        }
        return;
      }

      setStatus(`⏳ 渲染中... ${mins}分${secs}秒 (<a href="${run.html_url}" target="_blank" style="color:#88cc88">查看進度</a>)`, 'running');
    }
  }

  async function fetchLatestRelease(owner, repo, headers, runId) {
    // Wait a moment for release to be created
    await new Promise(r => setTimeout(r, 3000));
    const relRes = await fetch(
      `https://api.github.com/repos/${owner}/${repo}/releases/latest`,
      { headers }
    );
    const rel = await relRes.json();
    const asset = (rel.assets || []).find(a => a.name.endsWith('.mp4'));
    if (asset) {
      setStatus(
        `🎉 影片完成！<br><a id="download-link" href="${asset.browser_download_url}" download>⬇️ 下載影片 (${(asset.size / 1024 / 1024).toFixed(1)}MB)</a>`,
        'done'
      );
    } else {
      setStatus(`✅ 完成！<a href="${rel.html_url}" target="_blank" style="color:#aaaaff">前往 Release 下載</a>`, 'done');
    }
    $('submit-btn').disabled = false;
  }
</script>
</body>
</html>
