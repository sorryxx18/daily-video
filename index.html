<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>廢片生成所</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: oklch(95.5% 0.012 255);
      --surface: oklch(100% 0 0);
      --surface-subtle: oklch(98.3% 0.008 255);
      --surface-raised: oklch(99.4% 0.004 255);
      --ink: oklch(19% 0.045 255);
      --ink-2: oklch(25% 0.055 255);
      --border: oklch(89% 0.014 255);
      --border-strong: oklch(80% 0.024 255);
      --border-focus: oklch(54% 0.18 258);
      --text: oklch(20% 0.035 255);
      --muted: oklch(43% 0.03 255);
      --muted-soft: oklch(55% 0.026 255);
      --accent: oklch(53% 0.2 258);
      --accent-hover: oklch(47% 0.22 258);
      --accent-light: oklch(93% 0.04 258);
      --success: oklch(45% 0.13 158);
      --success-light: oklch(94% 0.04 158);
      --error: oklch(52% 0.19 28);
      --error-light: oklch(95% 0.035 28);
      --warning: oklch(52% 0.13 75);
      --warning-light: oklch(95% 0.045 75);
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 2px rgba(15, 23, 42, .06);
      --shadow-md: 0 8px 22px rgba(15, 23, 42, .08);
    }

    body {
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background:
        linear-gradient(90deg, rgba(25, 39, 76, .08) 1px, transparent 1px),
        linear-gradient(180deg, rgba(25, 39, 76, .08) 1px, transparent 1px),
        radial-gradient(circle at top left, oklch(80% 0.12 258 / .34), transparent 30rem),
        linear-gradient(180deg, oklch(99% 0.004 255), var(--bg) 24rem);
      background-size: 48px 48px, 48px 48px, auto, auto;
      color: var(--text);
      min-height: 100vh;
      padding: 32px 18px 72px;
    }

    .container { max-width: 1080px; margin: 0 auto; }

    .app-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      padding: 10px 12px;
      background: var(--ink);
      color: #fff;
      border-radius: 14px;
      box-shadow: var(--shadow-md);
    }

    .brand-lockup {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-size: 14px;
      font-weight: 760;
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      letter-spacing: .02em;
    }

    .app-status {
      color: oklch(88% 0.035 255);
      font-size: 13px;
      white-space: nowrap;
    }

    /* Header */
    .header {
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 20px;
      padding: 28px;
      color: #fff;
      background:
        radial-gradient(circle at right top, oklch(64% 0.18 258 / .34), transparent 24rem),
        linear-gradient(135deg, var(--ink), var(--ink-2));
      border-radius: 18px;
      overflow: hidden;
    }
    .header h1 {
      font-size: 32px;
      line-height: 1.15;
      font-weight: 780;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      text-wrap: balance;
    }
    .header p { font-size: 15px; color: oklch(88% 0.035 255); max-width: 36rem; line-height: 1.7; }

    .hero-kicker {
      display: inline-flex;
      align-items: center;
      margin-bottom: 14px;
      padding: 5px 9px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      color: oklch(90% 0.04 255);
      font-size: 12px;
      font-weight: 650;
    }

    .hero-panel {
      align-self: stretch;
      width: 260px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 14px;
      background: rgba(255,255,255,.08);
    }

    .hero-panel-title {
      color: oklch(88% 0.035 255);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .hero-stack {
      display: grid;
      gap: 8px;
    }

    .hero-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: #fff;
      font-size: 13px;
      font-weight: 650;
    }

    .hero-line span:last-child { color: oklch(86% 0.13 158); }

    /* Step indicator */
    .steps {
      display: grid;
      grid-template-columns: 1fr auto 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      background: rgba(255,255,255,.9);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 650;
      color: var(--muted);
      min-width: 0;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
    }
    .step.active { color: var(--accent); background: var(--accent-light); }
    .step.done { color: var(--success); background: var(--success-light); }
    .step-num {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 1px solid var(--border-strong);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      flex-shrink: 0;
      background: var(--surface);
    }
    .step span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .step.active .step-num { border-color: var(--accent); background: var(--accent); color: #fff; }
    .step.done .step-num { border-color: var(--success); background: var(--success); color: #fff; }
    .step-divider { width: 24px; height: 1px; background: var(--border-strong); }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .card-title { font-size: 16px; font-weight: 720; margin-bottom: 16px; letter-spacing: -0.01em; }

    /* Form elements */
    label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
    textarea, input[type="text"] {
      width: 100%;
      background: var(--surface-subtle);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 12px 13px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s, box-shadow .15s, background .15s;
      resize: none;
    }
    textarea:focus, input[type="text"]:focus {
      border-color: var(--border-focus);
      background: var(--surface);
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 16%, transparent);
    }
    textarea { min-height: 160px; line-height: 1.6; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600;
      border: none; cursor: pointer;
      transition: background .15s, color .15s, opacity .15s, transform .1s;
    }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; box-shadow: var(--shadow); }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border-strong); }
    .btn-secondary:hover:not(:disabled) { background: var(--surface-subtle); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover:not(:disabled) { background: #047857; }
    .btn-full { width: 100%; }

    /* Segment editor */
    .segments-list { display: flex; flex-direction: column; gap: 12px; }
    .segment-card {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
    .segment-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .segment-num {
      font-size: 12px; font-weight: 720; color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 4px 9px; border-radius: 999px;
    }
    .segment-card textarea { min-height: 72px; font-size: 13px; background: #fff; }
    .segment-query { margin-top: 8px; }
    .segment-query input { font-size: 12px; background: #fff; }
    .query-label {
      font-size: 11px; color: var(--muted); margin-bottom: 4px;
    }

    /* Status */
    .status {
      padding: 12px 14px; border-radius: var(--radius-sm);
      font-size: 14px; line-height: 1.6;
      display: none;
      margin-top: 12px;
    }
    .status.info    { background: var(--accent-light); color: var(--accent); border: 1px solid #c7d2fe; }
    .status.running { background: var(--warning-light); color: var(--warning); border: 1px solid #fde68a; }
    .status.done    { background: var(--success-light); color: var(--success); border: 1px solid #a7f3d0; }
    .status.error   { background: var(--error-light); color: var(--error); border: 1px solid #fecaca; }

    /* Download */
    .download-btn {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 10px; padding: 10px 20px;
      background: var(--success); color: #fff;
      border-radius: 8px; text-decoration: none;
      font-weight: 600; font-size: 14px;
      transition: background .15s;
    }
    .download-btn:hover { background: #047857; }

    /* Recent videos gallery */
    .video-gallery { margin-top: 32px; }
    .video-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .video-item:last-child { border-bottom: none; }
    .video-item-info { flex: 1; min-width: 0; }
    .video-item-name { display: block; font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .video-item-date { display: block; font-size: 12px; color: var(--muted); margin-top: 2px; }
    .video-item-dl {
      flex-shrink: 0;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 12px; background: var(--surface); color: var(--success);
      border: 1px solid color-mix(in oklch, var(--success) 35%, var(--border));
      border-radius: 999px; text-decoration: none; font-size: 13px; font-weight: 650;
      transition: background .15s;
    }
    .video-item-dl:hover { background: var(--success-light); }

    /* Category badge */
    .category-badge {
      display: inline-block;
      background: var(--accent-light); color: var(--accent);
      padding: 4px 10px; border-radius: 999px;
      font-size: 13px; font-weight: 600;
    }

    /* Settings */
    details { margin-top: 16px; }
    summary { font-size: 13px; color: var(--muted); cursor: pointer; user-select: none; }
    summary:hover { color: var(--accent); }
    .settings-body { margin-top: 12px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }

    /* Divider */
    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    /* Hidden */
    .hidden { display: none !important; }

    /* Batch photo upload */
    .batch-upload-zone {
      border: 1px dashed var(--border-strong); border-radius: var(--radius);
      padding: 18px; text-align: center; cursor: pointer;
      margin-bottom: 12px; transition: border-color .15s, background .15s;
      background: var(--surface-subtle);
    }
    .batch-upload-zone:hover { border-color: var(--accent); background: var(--accent-light); }
    .batch-upload-label { cursor: pointer; display: block; }
    .batch-upload-label span { display: block; }
    .batch-upload-label span:first-child { font-size: 14px; font-weight: 600; color: var(--text); }
    .batch-hint { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .photo-grid {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px;
    }
    .photo-thumb-item {
      position: relative; width: 64px; height: 64px;
    }
    .photo-thumb-item img {
      width: 64px; height: 64px; object-fit: cover;
      border-radius: 7px; border: 2px solid var(--border);
    }
    .photo-thumb-num {
      position: absolute; top: 2px; left: 4px;
      font-size: 10px; font-weight: 700; color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }
    .seg-photo-slot {
      margin-top: 8px; display: flex; align-items: center; gap: 8px;
      min-height: 36px;
    }
    .seg-photo-slot img {
      width: 48px; height: 48px; object-fit: cover;
      border-radius: 6px; border: 1px solid var(--border);
    }
    .no-photo-label {
      font-size: 11px; color: var(--muted);
      background: var(--bg); border: 1px dashed var(--border);
      border-radius: 6px; padding: 4px 10px;
    }
    .seg-clear-btn {
      font-size: 11px; color: var(--error); background: none;
      border: none; cursor: pointer; padding: 0; margin-left: 4px;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      align-items: start;
      gap: 18px;
    }

    .main-panel { min-width: 0; }

    .side-panel {
      position: sticky;
      top: 20px;
    }

    .quick-note {
      background:
        linear-gradient(180deg, color-mix(in oklch, var(--accent-light) 75%, #fff), #fff);
      border: 1px solid color-mix(in oklch, var(--accent) 20%, var(--border));
      border-radius: 14px;
      padding: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
      margin-bottom: 16px;
    }

    .quick-note strong {
      display: block;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 6px;
    }

    @media (max-width: 820px) {
      body { padding-top: 22px; }
      .app-bar { border-radius: 12px; }
      .app-status { display: none; }
      .header { display: block; margin-bottom: 20px; padding: 22px; }
      .header h1 { font-size: 28px; }
      .hero-panel { width: 100%; margin-top: 18px; }
      .workspace { display: block; }
      .side-panel { position: static; }
      .steps { grid-template-columns: 1fr; gap: 6px; }
      .step-divider { display: none; }
      .step span { white-space: normal; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="app-bar">
    <div class="brand-lockup">
      <span class="brand-mark">DV</span>
      <span>Daily Video Studio</span>
    </div>
    <div class="app-status">GitHub Actions Renderer</div>
  </div>

  <!-- Header -->
  <div class="header">
    <div>
      <div class="hero-kicker">文字轉短影音工作台</div>
      <h1>廢片生成所</h1>
      <p>把文字整理成短影音腳本，確認段落和素材後送出渲染。</p>
    </div>
    <div class="hero-panel" aria-hidden="true">
      <div class="hero-panel-title">目前流程</div>
      <div class="hero-stack">
        <div class="hero-line"><span>腳本</span><span>5 段</span></div>
        <div class="hero-line"><span>素材</span><span>照片 / Pexels</span></div>
        <div class="hero-line"><span>輸出</span><span>MP4</span></div>
      </div>
    </div>
  </div>

  <!-- Steps -->
  <div class="steps">
    <div class="step active" id="step1-indicator">
      <div class="step-num">1</div>
      <span>輸入內容</span>
    </div>
    <div class="step-divider"></div>
    <div class="step" id="step2-indicator">
      <div class="step-num">2</div>
      <span>確認腳本</span>
    </div>
    <div class="step-divider"></div>
    <div class="step" id="step3-indicator">
      <div class="step-num">3</div>
      <span>渲染下載</span>
    </div>
  </div>

  <div class="workspace">
    <main class="main-panel">
      <!-- Step 1: Input -->
      <div id="step1">
        <div class="card">
          <div class="card-title">原始內容</div>
          <textarea id="raw-text" placeholder="貼上天氣報告、課程筆記、新聞摘要，或任何想轉成影片的文字。"></textarea>
          <div style="margin-top:14px">
            <button class="btn btn-primary btn-full" id="generate-btn" onclick="generateScript()">
              生成腳本
            </button>
          </div>
          <div class="status" id="step1-status"></div>
        </div>

      </div>

      <!-- Step 2: Script editor -->
      <div id="step2" class="hidden">
        <div class="card">
          <div class="card-title" style="display:flex;align-items:center;justify-content:space-between;gap:12px">
            <span>確認腳本</span>
            <span class="category-badge" id="category-badge"></span>
          </div>
          <!-- Batch photo upload -->
          <div class="batch-upload-zone" onclick="$('batch-photo-input').click()">
            <label class="batch-upload-label">
              <span>上傳照片，可多選</span>
              <span class="batch-hint">系統會配對到合適段落，未配對的段落改用 Pexels 素材。</span>
            </label>
          </div>
          <input type="file" id="batch-photo-input" accept="image/*" multiple style="display:none" onchange="handleBatchUpload(this)">
          <div id="photo-grid" class="photo-grid hidden"></div>
          <button class="btn btn-secondary" id="assign-btn" onclick="assignPhotos()" style="display:none;margin-bottom:12px;width:100%">自動配對照片</button>

          <div class="segments-list" id="segments-list"></div>
          <div class="divider"></div>
          <div style="display:flex;gap:10px">
            <button class="btn btn-secondary" onclick="backToStep1()" style="flex:1">重新輸入</button>
            <button class="btn btn-success" onclick="renderVideo()" style="flex:2" id="render-btn">
              確認渲染
            </button>
          </div>
          <div class="status" id="step2-status"></div>
        </div>
      </div>

      <!-- Step 3: Progress & download -->
      <div id="step3" class="hidden">
        <div class="card">
          <div class="card-title">渲染進度</div>
          <div class="status running" id="step3-status" style="display:block">等待 Actions 啟動...</div>
          <div id="download-area" style="margin-top:12px;display:none">
            <a id="download-link" class="download-btn" download>下載影片</a>
            <div style="margin-top:12px">
              <button class="btn btn-secondary" onclick="reset()">重新製作</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <aside class="side-panel">
      <div class="quick-note">
        <strong>製作流程</strong>
        先貼文字生成五段腳本，再確認每段文案、搜尋詞與可選照片。送出後會啟動 GitHub Actions 渲染，完成後回到這裡下載。
      </div>

      <!-- Recent videos -->
      <div class="card video-gallery">
        <div class="card-title">最新影片</div>
        <div id="video-list"><span style="color:var(--muted);font-size:14px">載入中...</span></div>
      </div>
    </aside>
  </div>

</div>

<script>
  const $ = id => document.getElementById(id);
  const REPO = 'sorryxx18/daily-video';


  function showStatus(id, msg, type) {
    const el = $(id);
    el.style.display = 'block';
    el.className = `status ${type}`;
    el.innerHTML = msg;
  }

  function hideStatus(id) {
    $(id).style.display = 'none';
  }

  function setStep(n) {
    ['step1','step2','step3'].forEach((id, i) => {
      $(id).classList.toggle('hidden', i !== n - 1);
    });
    [1,2,3].forEach(i => {
      const el = $(`step${i}-indicator`);
      el.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
    });
  }

  function getWorkerUrl() {
    return 'https://daily-video-trigger.sorryxx18.workers.dev';
  }

  // ── Step 1: generate script ────────────────────────────────────────────────
  async function generateScript() {
    const rawText = $('raw-text').value.trim();
    if (!rawText) return showStatus('step1-status', '請貼上原始文字內容。', 'error');

    const workerUrl = getWorkerUrl();
    $('generate-btn').disabled = true;
    showStatus('step1-status', '正在生成腳本...', 'info');

    try {
      const res = await fetch(workerUrl + '/preview', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ raw_text: rawText }),
      });
      const data = await res.json();

      if (!res.ok || !data.segments) {
        showStatus('step1-status', `生成失敗：${data.error || res.status}`, 'error');
        $('generate-btn').disabled = false;
        return;
      }

      renderScriptEditor(data.category, data.segments);
      setStep(2);
      hideStatus('step1-status');

    } catch (e) {
      showStatus('step1-status', `無法連線到 Worker：${e.message}`, 'error');
      $('generate-btn').disabled = false;
    }
  }

  function renderScriptEditor(category, segments) {
    $('category-badge').textContent = category;
    window._category = category;
    window._segments = segments;
    window._uploadedPhotos = [];
    window._assignments = {};

    // Reset photo UI
    $('photo-grid').innerHTML = '';
    $('photo-grid').classList.add('hidden');
    $('assign-btn').style.display = 'none';
    $('batch-photo-input').value = '';

    const list = $('segments-list');
    list.innerHTML = '';
    segments.forEach((seg, i) => {
      const div = document.createElement('div');
      div.className = 'segment-card';
      div.innerHTML = `
        <div class="segment-header">
          <span class="segment-num">段落 ${i+1}</span>
        </div>
        <textarea id="seg-text-${i}" rows="3">${seg[0]}</textarea>
        <div class="segment-query">
          <div class="query-label">Pexels 搜尋詞</div>
          <input type="text" id="seg-query-${i}" value="${seg[1]}">
        </div>
        <div class="seg-photo-slot" id="seg-photo-${i}">
          <span class="no-photo-label">自動找影片</span>
        </div>`;
      list.appendChild(div);
    });
  }

  function backToStep1() {
    $('generate-btn').disabled = false;
    setStep(1);
  }

  async function handleBatchUpload(input) {
    const files = Array.from(input.files);
    if (!files.length) return;
    window._uploadedPhotos = [];
    window._assignments = {};

    const grid = $('photo-grid');
    grid.innerHTML = '';
    grid.classList.remove('hidden');

    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      const objectUrl = URL.createObjectURL(file);
      // Resize to max 512px for AI (speeds up Gemini Vision significantly)
      const data = await new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const MAX = 512;
          let w = img.width, h = img.height;
          if (w > MAX || h > MAX) {
            if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
            else { w = Math.round(w * MAX / h); h = MAX; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.8));
        };
        img.src = objectUrl;
      });
      const ext = 'jpg';
      window._uploadedPhotos.push({ data, ext, objectUrl });

      const item = document.createElement('div');
      item.className = 'photo-thumb-item';
      item.innerHTML = `<img src="${objectUrl}" alt="照片 ${i}"><span class="photo-thumb-num">${i}</span>`;
      grid.appendChild(item);
    }

    $('assign-btn').style.display = 'block';
    updateSegmentPhotoSlots();
  }

  async function assignPhotos() {
    if (!window._uploadedPhotos.length) return;
    const workerUrl = getWorkerUrl();
    const segments = Array.from({ length: 5 }, (_, i) => [
      $(`seg-text-${i}`).value.trim(),
      $(`seg-query-${i}`).value.trim(),
    ]);

    $('assign-btn').disabled = true;
    let assignSecs = 0;
    const assignTimer = setInterval(() => {
      assignSecs++;
      $('assign-btn').textContent = `照片配對中... ${assignSecs} 秒`;
    }, 1000);

    try {
      const res = await fetch(workerUrl + '/assign', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          segments,
          photos: window._uploadedPhotos.map(p => ({ data: p.data, ext: p.ext })),
        }),
      });
      const result = await res.json();
      if (!res.ok || !result.assignments) {
        showStatus('step2-status', `照片配對失敗：${result.error || res.status}`, 'error');
        return;
      }
      window._assignments = result.assignments;
      updateSegmentPhotoSlots();
      showStatus('step2-status', '配對完成，可在各段落確認。', 'done');
    } catch (e) {
      showStatus('step2-status', `連線失敗：${e.message}`, 'error');
    } finally {
      clearInterval(assignTimer);
      $('assign-btn').disabled = false;
      $('assign-btn').textContent = '自動配對照片';
    }
  }

  function updateSegmentPhotoSlots() {
    for (let i = 0; i < 5; i++) {
      const slot = $(`seg-photo-${i}`);
      if (!slot) continue;
      const photoIdx = window._assignments[i];
      const photo = (photoIdx !== undefined) ? window._uploadedPhotos[photoIdx] : null;
      if (photo) {
        slot.innerHTML = `<img src="${photo.objectUrl}" alt="段落${i+1}照片"><span style="font-size:12px;color:var(--muted)">照片 ${photoIdx}</span><button class="seg-clear-btn" onclick="clearSegmentPhoto(${i})">清除</button>`;
      } else {
        slot.innerHTML = '<span class="no-photo-label">自動找影片</span>';
      }
    }
  }

  function clearSegmentPhoto(segIdx) {
    delete window._assignments[segIdx];
    updateSegmentPhotoSlots();
  }

  // ── Step 2: render ─────────────────────────────────────────────────────────
  async function renderVideo() {
    const workerUrl = getWorkerUrl();
    const category = window._category;
    const segments = Array.from({ length: 5 }, (_, i) => [
      $(`seg-text-${i}`).value.trim(),
      $(`seg-query-${i}`).value.trim(),
    ]);

    if (segments.some(s => !s[0] || !s[1])) {
      return showStatus('step2-status', '每個段落的文字和搜尋詞都必須填寫。', 'error');
    }

    $('render-btn').disabled = true;
    showStatus('step2-status', '正在上傳照片並觸發渲染...', 'info');

    // Build photos from AI assignments
    const photos = [];
    for (const [segIdxStr, photoIdx] of Object.entries(window._assignments || {})) {
      const photo = (window._uploadedPhotos || [])[photoIdx];
      if (photo) {
        photos.push({ index: parseInt(segIdxStr), data: photo.data, ext: photo.ext });
      }
    }

    let triggerTime;
    try {
      const res = await fetch(workerUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          segments_json: JSON.stringify(segments),
          category,
          photos: photos.length > 0 ? photos : undefined,
        }),
      });
      const data = await res.json();
      if (!res.ok || !data.triggered) {
        showStatus('step2-status', `觸發失敗：${data.error || res.status}`, 'error');
        $('render-btn').disabled = false;
        return;
      }
      triggerTime = data.trigger_time;
    } catch (e) {
      showStatus('step2-status', `連線失敗：${e.message}`, 'error');
      $('render-btn').disabled = false;
      return;
    }

    setStep(3);
    pollRun(triggerTime);
  }

  // ── Step 3: poll ───────────────────────────────────────────────────────────
  async function pollRun(triggerTime) {
    let runId = null, attempts = 0, elapsed = 0, runUrl = '';

    // Live elapsed timer — updates every second throughout
    const elapsedTimer = setInterval(() => {
      elapsed++;
      const m = Math.floor(elapsed / 60), s = String(elapsed % 60).padStart(2, '0');
      const timeStr = m > 0 ? `${m}分${s}秒` : `${elapsed}秒`;
      if (!runId) {
        showStatus('step3-status', `等待 Actions 啟動... ${timeStr}`, 'running');
      } else {
        const link = runUrl ? ` · <a href="${runUrl}" target="_blank">查看進度</a>` : '';
        showStatus('step3-status', `渲染中... ${timeStr}（約 10 分鐘）${link}`, 'running');
      }
    }, 1000);

    while (!runId && attempts < 15) {
      attempts++;
      await new Promise(r => setTimeout(r, 5000));
      try {
        const res = await fetch(
          `https://api.github.com/repos/${REPO}/actions/workflows/render.yml/runs?per_page=5`,
          { headers: { Accept: 'application/vnd.github+json' } }
        );
        const data = await res.json();
        const run = (data.workflow_runs || []).find(r => new Date(r.created_at) >= new Date(triggerTime));
        if (run) { runId = run.id; runUrl = run.html_url; }
      } catch {}
    }

    if (!runId) {
      clearInterval(elapsedTimer);
      showStatus('step3-status', '找不到 Actions run。<a href="https://github.com/' + REPO + '/actions" target="_blank">手動查看</a>', 'error');
      return;
    }

    while (true) {
      await new Promise(r => setTimeout(r, 15000));
      try {
        const res = await fetch(
          `https://api.github.com/repos/${REPO}/actions/runs/${runId}`,
          { headers: { Accept: 'application/vnd.github+json' } }
        );
        const run = await res.json();
        runUrl = run.html_url;
        if (run.status === 'completed') {
          clearInterval(elapsedTimer);
          if (run.conclusion === 'success') {
            await fetchRelease();
          } else {
            showStatus('step3-status', `渲染失敗 (${run.conclusion})。<a href="${run.html_url}" target="_blank">查看詳細</a>`, 'error');
          }
          return;
        }
      } catch {}
    }
  }

  async function fetchRelease() {
    await new Promise(r => setTimeout(r, 3000));
    try {
      const res = await fetch(
        `https://api.github.com/repos/${REPO}/releases/latest`,
        { headers: { Accept: 'application/vnd.github+json' } }
      );
      const rel = await res.json();
      const asset = (rel.assets || []).find(a => a.name.endsWith('.mp4'));
      showStatus('step3-status', '影片製作完成。', 'done');
      loadRecentVideos();
      const area = $('download-area');
      area.style.display = 'block';
      const link = $('download-link');
      if (asset) {
        link.href = asset.browser_download_url;
        link.textContent = `${asset.name} (${(asset.size/1024/1024).toFixed(1)}MB)`;
      } else {
        link.href = rel.html_url;
        link.textContent = '前往 Release 下載';
        link.target = '_blank';
      }
    } catch {
      showStatus('step3-status', '已完成。<a href="https://github.com/' + REPO + '/releases" target="_blank">前往下載</a>', 'done');
    }
  }

  function reset() {
    $('generate-btn').disabled = false;
    $('render-btn').disabled = false;
    $('download-area').style.display = 'none';
    setStep(1);
  }

  async function loadRecentVideos() {
    const list = $('video-list');
    try {
      const res = await fetch(
        `https://api.github.com/repos/${REPO}/releases?per_page=10`,
        { headers: { Accept: 'application/vnd.github+json' } }
      );
      const releases = await res.json();
      if (!Array.isArray(releases) || !releases.length) {
        list.innerHTML = '<span style="color:var(--muted);font-size:14px">尚無影片</span>';
        return;
      }
      list.innerHTML = releases.map(rel => {
        const asset = (rel.assets || []).find(a => a.name.endsWith('.mp4'));
        const date = rel.created_at ? rel.created_at.slice(0, 10) : '';
        const sizeTxt = asset ? ` (${(asset.size / 1024 / 1024).toFixed(1)}MB)` : '';
        const href = asset ? asset.browser_download_url : rel.html_url;
        const dlAttr = asset ? 'download' : 'target="_blank"';
        const label = asset ? asset.name : rel.name;
        return `<div class="video-item">
          <div class="video-item-info">
            <span class="video-item-name">${rel.name}</span>
            <span class="video-item-date">${date}</span>
          </div>
          <a href="${href}" class="${'video-item-dl'}" ${dlAttr}>下載${sizeTxt}</a>
        </div>`;
      }).join('');
    } catch {
      list.innerHTML = '<span style="color:var(--muted);font-size:14px">載入失敗</span>';
    }
  }

  loadRecentVideos();
</script>
</body>
</html>
