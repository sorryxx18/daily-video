<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廢片生成所 DVDaily Video Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #a5b4fc;
            --secondary: #f472b6;
            --accent: #22d3ee;
            --bg: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-elevated: #252542;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.08);
            --success: #34d399;
            --warning: #fbbf24;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 動態背景 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            animation: float 8s ease-in-out infinite;
        }

        .bg-animation::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(244,114,182,0.1) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }

        /* 頂部導航 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(15, 15, 26, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
        }

        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(99,102,241,0.4);
        }

        .logo-text {
            font-weight: 900;
            font-size: 1.2rem;
            background: linear-gradient(135deg, var(--text), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-sub {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .nav-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            background: var(--bg-elevated);
            color: var(--text);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 20px rgba(99,102,241,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99,102,241,0.4);
        }

        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 2rem 4rem;
        }

        /* 英雄區 */
        .hero {
            text-align: center;
            margin-bottom: 4rem;
            padding: 2rem 0;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(99,102,241,0.15);
            border: 1px solid rgba(99,102,241,0.3);
            border-radius: 100px;
            font-size: 0.85rem;
            color: var(--primary-light);
            margin-bottom: 1.5rem;
        }

        .hero-badge i {
            color: var(--accent);
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .hero h1 .gradient-text {
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% 200%;
            animation: gradient-shift 3s ease infinite;
        }

        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 500px;
            margin: 0 auto 2rem;
            line-height: 1.7;
        }

        /* 步驟導航 */
        .stepper {
            display: flex;
            justify-content: center;
            gap: 0;
            margin-bottom: 3rem;
            position: relative;
        }

        .stepper-line {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 2px;
            background: var(--bg-elevated);
            z-index: 0;
        }

        .stepper-line-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.5s ease;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 1;
            padding: 0 2rem;
            position: relative;
        }

        .step-number {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .step.completed .step-number {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 15px rgba(99,102,241,0.4);
        }

        .step.active .step-number {
            background: var(--bg-card);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99,102,241,0.2), 0 4px 15px rgba(99,102,241,0.3);
            animation: pulse 2s infinite;
        }

        .step.pending .step-number {
            background: var(--bg-elevated);
            color: var(--text-muted);
            border-color: var(--border);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 4px rgba(99,102,241,0.2), 0 4px 15px rgba(99,102,241,0.3); }
            50% { box-shadow: 0 0 0 8px rgba(99,102,241,0.1), 0 4px 20px rgba(99,102,241,0.4); }
        }

        .step-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .step.active .step-label {
            color: var(--text);
            font-weight: 700;
        }

        .step.completed .step-label {
            color: var(--primary-light);
        }

        /* 工作區卡片 */
        .workspace {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
        }

        .workspace::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
        }

        .workspace-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .workspace-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .workspace-title-icon {
            width: 44px;
            height: 44px;
            background: rgba(99,102,241,0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1.2rem;
        }

        .workspace-title h2 {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .workspace-title p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* 上傳區域 */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            background: rgba(255,255,255,0.02);
            position: relative;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(99,102,241,0.05);
        }

        .upload-zone.dragover {
            border-color: var(--accent);
            background: rgba(34,211,238,0.05);
            transform: scale(1.01);
        }

        .upload-zone i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
            display: block;
        }

        .upload-zone h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .upload-zone p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .upload-zone .upload-hint {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            opacity: 0.7;
        }

        /* 渲染進度 */
        .render-panel {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            margin-top: 0;
        }

        .render-animation {
            width: 120px;
            height: 120px;
            margin: 0 auto 1.5rem;
            position: relative;
        }

        .render-ring {
            position: absolute;
            border-radius: 50%;
            border: 3px solid transparent;
        }

        .render-ring:nth-child(1) {
            width: 100%;
            height: 100%;
            border-top-color: var(--primary);
            animation: spin 1.5s linear infinite;
        }

        .render-ring:nth-child(2) {
            width: 75%;
            height: 75%;
            top: 12.5%;
            left: 12.5%;
            border-right-color: var(--secondary);
            animation: spin 1.2s linear infinite reverse;
        }

        .render-ring:nth-child(3) {
            width: 50%;
            height: 50%;
            top: 25%;
            left: 25%;
            border-bottom-color: var(--accent);
            animation: spin 1s linear infinite;
        }

        .render-center {
            position: absolute;
            top: 35%;
            left: 35%;
            width: 30%;
            height: 30%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #fff;
            animation: pulse-center 2s ease infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse-center {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .render-panel h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }

        .render-panel p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        /* 底部操作 */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .btn-large {
            padding: 14px 32px;
            font-size: 1rem;
        }

        .btn-secondary {
            background: var(--bg-elevated);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-card);
            border-color: var(--primary);
        }

        /* 響應式 */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .stepper { flex-direction: column; gap: 1rem; }
            .stepper-line { display: none; }
            .workspace { padding: 1.5rem; }
            .action-bar { flex-direction: column; gap: 1rem; }
            .nav-actions .btn span,
            .navbar .logo-sub { display: none; }
        }

        /* 滾動條美化 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bg-elevated);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* ─────────────────────────────────────────────────────────────────────
           Functional CSS — preserves existing app behavior on top of dark theme
           ───────────────────────────────────────────────────────────────────── */
        .hidden { display: none !important; }
        .status { padding: 12px 14px; border-radius: 10px; font-size: 14px; line-height: 1.6; display: none; margin-top: 12px; }
        .status.info { background: rgba(99,102,241,0.15); color: var(--primary-light); border: 1px solid rgba(99,102,241,0.3); }
        .status.running { background: rgba(251,191,36,0.15); color: var(--warning); border: 1px solid rgba(251,191,36,0.3); }
        .status.done { background: rgba(52,211,153,0.15); color: var(--success); border: 1px solid rgba(52,211,153,0.3); }
        .status.error { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
        .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }
        textarea, input[type="text"] {
          width: 100%; border-radius: 10px; border: 1px solid var(--border);
          background: var(--bg-elevated); color: var(--text); padding: 12px 14px;
          font-size: 14px; font-family: inherit; outline: none;
          transition: border-color .15s; resize: none;
        }
        textarea { min-height: 160px; line-height: 1.6; }
        textarea:focus, input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
        .category-badge { display: inline-block; background: rgba(99,102,241,0.2); color: var(--primary-light); padding: 4px 12px; border-radius: 999px; font-size: 13px; font-weight: 600; }
        /* Segment cards */
        .segment-card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
        .segment-header { display: flex; align-items: center; margin-bottom: 10px; }
        .segment-num { font-size: 12px; font-weight: 700; color: var(--primary-light); background: rgba(99,102,241,0.15); padding: 4px 10px; border-radius: 999px; }
        .segment-card textarea { min-height: 68px; font-size: 13px; margin-top: 0; }
        .segment-query { margin-top: 8px; }
        .segment-query input { font-size: 12px; }
        .query-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
        .seg-photo-slot { margin-top: 8px; display: flex; align-items: center; gap: 8px; min-height: 36px; }
        .seg-photo-slot img { width: 48px; height: 48px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }
        .no-photo-label { font-size: 11px; color: var(--text-muted); background: var(--bg); border: 1px dashed rgba(255,255,255,0.15); border-radius: 6px; padding: 4px 10px; }
        .seg-clear-btn { font-size: 11px; color: #f87171; background: none; border: none; cursor: pointer; padding: 0; margin-left: 4px; }
        /* Photo grid */
        .photo-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 12px; }
        .photo-thumb-item { position: relative; width: 64px; height: 64px; }
        .photo-thumb-item img { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; border: 2px solid var(--border); }
        .photo-thumb-num { position: absolute; top: 2px; left: 4px; font-size: 10px; font-weight: 700; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
        /* Download button */
        .download-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; background: linear-gradient(135deg, var(--success), #059669); color: #fff; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 15px; transition: opacity .15s; }
        .download-btn:hover { opacity: 0.88; }
        /* Recent videos */
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; }
        .card-title { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
        .video-gallery {}
        .video-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 12px; }
        .video-item:last-child { border-bottom: none; }
        .video-item-info { flex: 1; min-width: 0; }
        .video-item-name { display: block; font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
        .video-item-date { display: block; font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .video-item-dl { flex-shrink: 0; display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: rgba(52,211,153,0.15); color: var(--success); border: 1px solid rgba(52,211,153,0.3); border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 600; transition: background .15s; }
        .video-item-dl:hover { background: rgba(52,211,153,0.25); }
        /* Script section */
        .script-section { margin-top: 1.5rem; }
        .segments-list { display: flex; flex-direction: column; }
        .script-card {
          display: grid; grid-template-columns: 42px minmax(0, 1fr) 112px; gap: 14px;
          align-items: stretch; background: var(--bg-elevated); border: 1px solid var(--border);
          border-radius: 8px; padding: 14px; margin-bottom: 12px;
        }
        .script-card.matched { border-color: rgba(52,211,153,0.38); }
        .script-card.unmatched { border-color: rgba(251,191,36,0.24); }
        .script-index {
          width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
          border-radius: 8px; background: rgba(99,102,241,0.16); color: var(--primary-light);
          font-weight: 800; font-size: 14px;
        }
        .script-content { min-width: 0; }
        .script-content textarea { min-height: 72px; font-size: 13px; }
        .script-meta { margin-top: 10px; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
        .meta-tag {
          display: inline-flex; align-items: center; gap: 6px; padding: 5px 9px;
          border-radius: 8px; font-size: 12px; font-weight: 700;
        }
        .meta-tag.matched { background: rgba(52,211,153,0.14); color: var(--success); }
        .meta-tag.unmatched { background: rgba(251,191,36,0.12); color: var(--warning); }
        .script-thumbnail {
          min-height: 112px; border-radius: 8px; border: 1px dashed rgba(255,255,255,0.16);
          background: rgba(255,255,255,0.025); overflow: hidden;
        }
        .script-thumbnail img { width: 100%; height: 100%; min-height: 112px; object-fit: cover; display: block; }
        .media-grid {
          display: grid; grid-template-columns: repeat(auto-fill, minmax(86px, 1fr));
          gap: 10px; margin: 8px 0 14px;
        }
        .media-item {
          position: relative; aspect-ratio: 1; overflow: hidden; border-radius: 8px;
          border: 1px solid var(--border); background: var(--bg-elevated);
        }
        .media-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .media-tag.user {
          position: absolute; top: 6px; left: 6px; min-width: 24px; height: 24px;
          display: inline-flex; align-items: center; justify-content: center;
          border-radius: 999px; background: rgba(15,15,26,0.78); color: #fff;
          border: 1px solid rgba(255,255,255,0.18); font-size: 12px; font-weight: 800;
        }
        @media (max-width: 640px) {
          .script-card { grid-template-columns: 34px minmax(0, 1fr); }
          .script-thumbnail { grid-column: 1 / -1; min-height: 160px; }
          .script-thumbnail img { min-height: 160px; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <!-- 導航欄 -->
    <nav class="navbar">
        <div class="nav-content">
            <a href="#" class="logo">
                <div class="logo-icon">🎬</div>
                <div>
                    <div class="logo-text">廢片生成所</div>
                    <div class="logo-sub">DVDaily Video Studio</div>
                </div>
            </a>
            <div class="nav-actions">
                <a href="https://github.com/sorryxx18/daily-video/releases" class="btn btn-ghost" target="_blank"><i class="fas fa-history"></i> 歷史影片</a>
            </div>
        </div>
    </nav>

    <!-- 主內容 -->
    <div class="main-container">
        <!-- 英雄區 -->
        <div class="hero">
            <div class="hero-badge">
                <i class="fas fa-robot"></i>
                GitHub Actions 自動渲染
            </div>
            <h1>文字轉短影音<br><span class="gradient-text">工作台</span></h1>
            <p>把文字整理成短影音腳本，確認段落和素材後送出渲染，自動生成專業短影音。</p>
        </div>

        <!-- 步驟導航 -->
        <div class="stepper">
            <div class="stepper-line">
                <div class="stepper-line-progress"></div>
            </div>
            <div class="step active" id="step1-indicator">
                <div class="step-number">1</div>
                <div class="step-label">輸入內容</div>
            </div>
            <div class="step pending" id="step2-indicator">
                <div class="step-number">2</div>
                <div class="step-label">確認腳本</div>
            </div>
            <div class="step pending" id="step3-indicator">
                <div class="step-number">3</div>
                <div class="step-label">渲染下載</div>
            </div>
        </div>

        <!-- 工作區 -->
        <div class="workspace">
            <!-- Step 1: Input -->
            <div id="step1">
                <div class="workspace-header">
                    <div class="workspace-title">
                        <div class="workspace-title-icon"><i class="fas fa-file-lines"></i></div>
                        <div><h2>輸入內容</h2><p>貼上文字，AI 自動生成五段腳本</p></div>
                    </div>
                </div>
                <textarea id="raw-text" placeholder="貼上天氣報告、新聞摘要、課程筆記，或任何想轉成影片的文字。"></textarea>
                <div class="action-bar" style="justify-content:flex-end;margin-top:1rem">
                    <button class="btn btn-primary btn-large" id="generate-btn" onclick="generateScript()">
                        <i class="fas fa-magic"></i> 生成腳本
                    </button>
                </div>
                <div class="status" id="step1-status"></div>
            </div>

            <!-- Step 2: Script editor -->
            <div id="step2" class="hidden">
                <div class="workspace-header">
                    <div class="workspace-title">
                        <div class="workspace-title-icon"><i class="fas fa-images"></i></div>
                        <div><h2>確認腳本</h2><span class="category-badge" id="category-badge"></span></div>
                    </div>
                </div>
                <!-- Photo upload zone -->
                <div class="upload-zone" onclick="$('batch-photo-input').click()">
                    <i class="fas fa-cloud-arrow-up"></i>
                    <h3>拖曳照片到這裡，或點擊上傳</h3>
                    <p>支援 JPG、PNG、WebP，可多選批量上傳</p>
                    <div class="upload-hint">未配對的段落將自動使用 Pexels 免費素材</div>
                </div>
                <input type="file" id="batch-photo-input" accept="image/*" multiple style="display:none" onchange="handleBatchUpload(this)">
                <div id="photo-grid" class="photo-grid hidden"></div>
                <button class="btn btn-secondary" id="assign-btn" onclick="assignPhotos()" style="display:none;margin-bottom:12px;width:100%">
                    <i class="fas fa-robot"></i> AI 自動配對照片
                </button>
                <div class="script-section">
                    <div class="segments-list" id="segments-list"></div>
                </div>
                <div class="divider"></div>
                <div class="action-bar">
                    <button class="btn btn-secondary btn-large" onclick="backToStep1()">
                        <i class="fas fa-arrow-left"></i> 重新輸入
                    </button>
                    <button class="btn btn-primary btn-large" onclick="renderVideo()" id="render-btn">
                        <i class="fas fa-film"></i> 確認渲染
                    </button>
                </div>
                <div class="status" id="step2-status"></div>
            </div>

            <!-- Step 3: Progress & download -->
            <div id="step3" class="hidden">
                <div class="render-panel">
                    <div class="render-animation" id="render-animation">
                        <div class="render-ring"></div>
                        <div class="render-ring"></div>
                        <div class="render-ring"></div>
                        <div class="render-center"><i class="fas fa-film"></i></div>
                    </div>
                    <h3>正在渲染中...</h3>
                    <p>GitHub Actions 已啟動，正在處理您的影片</p>
                    <div class="status running" id="step3-status" style="display:block">等待 Actions 啟動...</div>
                    <div id="download-area" style="margin-top:1.5rem;display:none">
                        <a id="download-link" class="download-btn" download>⬇️ 下載影片</a>
                        <div style="margin-top:1rem">
                            <button class="btn btn-secondary" onclick="reset()">重新製作</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent videos -->
        <div class="card video-gallery" style="margin-top:2rem">
            <div class="card-title">最新影片</div>
            <div id="video-list"><span style="color:var(--text-muted);font-size:14px">載入中...</span></div>
        </div>
    </div>

<script>
  const $ = id => document.getElementById(id);
  const REPO = 'sorryxx18/daily-video';


  function showStatus(id, msg, type) {
    const el = $(id);
    el.style.display = 'block';
    el.className = `status ${type}`;
    el.innerHTML = msg;
  }

  function hideStatus(id) {
    $(id).style.display = 'none';
  }

  function setStep(n) {
    ['step1','step2','step3'].forEach((id, i) => {
      $(id).classList.toggle('hidden', i !== n - 1);
    });
    [1,2,3].forEach(i => {
      const el = $(`step${i}-indicator`);
      const numEl = el.querySelector('.step-number');
      if (i < n) {
        el.className = 'step completed';
        if (numEl) numEl.innerHTML = '<i class="fas fa-check"></i>';
      } else if (i === n) {
        el.className = 'step active';
        if (numEl) numEl.textContent = i;
      } else {
        el.className = 'step pending';
        if (numEl) numEl.textContent = i;
      }
    });
    const progress = document.querySelector('.stepper-line-progress');
    if (progress) progress.style.width = n === 1 ? '0%' : n === 2 ? '50%' : '100%';
  }

  function getWorkerUrl() {
    return 'https://daily-video-trigger.sorryxx18.workers.dev';
  }

  // ── Step 1: generate script ────────────────────────────────────────────────
  async function generateScript() {
    const rawText = $('raw-text').value.trim();
    if (!rawText) return showStatus('step1-status', '請貼上原始文字內容。', 'error');

    const workerUrl = getWorkerUrl();
    $('generate-btn').disabled = true;
    showStatus('step1-status', '正在生成腳本...', 'info');

    try {
      const res = await fetch(workerUrl + '/preview', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ raw_text: rawText }),
      });
      const data = await res.json();

      if (!res.ok || !data.segments) {
        showStatus('step1-status', `生成失敗：${data.error || res.status}`, 'error');
        $('generate-btn').disabled = false;
        return;
      }

      renderScriptEditor(data.category, data.segments);
      setStep(2);
      hideStatus('step1-status');

    } catch (e) {
      showStatus('step1-status', `無法連線到 Worker：${e.message}`, 'error');
      $('generate-btn').disabled = false;
    }
  }

  function renderScriptEditor(category, segments) {
    $('category-badge').textContent = category;
    window._category = category;
    window._segments = segments;
    window._uploadedPhotos = [];
    window._assignments = {};

    // Reset photo UI
    $('photo-grid').innerHTML = '';
    $('photo-grid').className = 'photo-grid hidden';
    $('assign-btn').style.display = 'none';
    $('batch-photo-input').value = '';

    const list = $('segments-list');
    list.innerHTML = '';
    segments.forEach((seg, i) => {
      const div = document.createElement('div');
      div.className = 'script-card unmatched';
      div.id = `script-card-${i}`;
      div.innerHTML = `
        <div class="script-index">${i+1}</div>
        <div class="script-content">
          <textarea id="seg-text-${i}" rows="3">${seg[0]}</textarea>
          <div class="segment-query">
            <div class="query-label">Pexels 搜尋詞</div>
            <input type="text" id="seg-query-${i}" value="${seg[1]}">
          </div>
          <div class="script-meta" id="seg-meta-${i}">
            <span class="meta-tag unmatched"><i class="fas fa-image"></i> 將使用 Pexels 素材</span>
          </div>
        </div>
        <div class="script-thumbnail" id="seg-photo-${i}"></div>`;
      list.appendChild(div);
    });
  }

  function backToStep1() {
    $('generate-btn').disabled = false;
    setStep(1);
  }

  async function handleBatchUpload(input) {
    const files = Array.from(input.files);
    if (!files.length) return;
    window._uploadedPhotos = [];
    window._assignments = {};

    const grid = $('photo-grid');
    grid.innerHTML = '';
    grid.className = 'media-grid';

    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      const objectUrl = URL.createObjectURL(file);
      // Resize to max 512px for AI (speeds up Gemini Vision significantly)
      const data = await new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const MAX = 512;
          let w = img.width, h = img.height;
          if (w > MAX || h > MAX) {
            if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
            else { w = Math.round(w * MAX / h); h = MAX; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.8));
        };
        img.src = objectUrl;
      });
      const ext = 'jpg';
      window._uploadedPhotos.push({ data, ext, objectUrl });

      const item = document.createElement('div');
      item.className = 'media-item';
      item.innerHTML = `<img src="${objectUrl}" alt="照片 ${i}"><span class="media-tag user">${i}</span>`;
      grid.appendChild(item);
    }

    $('assign-btn').style.display = 'block';
    updateSegmentPhotoSlots();
  }

  async function assignPhotos() {
    if (!window._uploadedPhotos.length) return;
    const workerUrl = getWorkerUrl();
    const segments = Array.from({ length: 5 }, (_, i) => [
      $(`seg-text-${i}`).value.trim(),
      $(`seg-query-${i}`).value.trim(),
    ]);

    $('assign-btn').disabled = true;
    let assignSecs = 0;
    const assignTimer = setInterval(() => {
      assignSecs++;
      $('assign-btn').textContent = `照片配對中... ${assignSecs} 秒`;
    }, 1000);

    try {
      const res = await fetch(workerUrl + '/assign', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          segments,
          photos: window._uploadedPhotos.map(p => ({ data: p.data, ext: p.ext })),
        }),
      });
      const result = await res.json();
      if (!res.ok || !result.assignments) {
        showStatus('step2-status', `照片配對失敗：${result.error || res.status}`, 'error');
        return;
      }
      window._assignments = result.assignments;
      updateSegmentPhotoSlots();
      showStatus('step2-status', '配對完成，可在各段落確認。', 'done');
    } catch (e) {
      showStatus('step2-status', `連線失敗：${e.message}`, 'error');
    } finally {
      clearInterval(assignTimer);
      $('assign-btn').disabled = false;
      $('assign-btn').textContent = '自動配對照片';
    }
  }

  function updateSegmentPhotoSlots() {
    for (let i = 0; i < 5; i++) {
      const slot = $(`seg-photo-${i}`);
      const card = $(`script-card-${i}`);
      const meta = $(`seg-meta-${i}`);
      if (!slot) continue;
      const photoIdx = window._assignments[i];
      const photo = (photoIdx !== undefined) ? window._uploadedPhotos[photoIdx] : null;
      if (photo) {
        slot.innerHTML = `<img src="${photo.objectUrl}" alt="段落${i+1}照片">`;
        if (card) { card.classList.remove('unmatched'); card.classList.add('matched'); }
        if (meta) meta.innerHTML = `<span class="meta-tag matched"><i class="fas fa-check-circle"></i> 已配對照片 ${photoIdx}</span><button class="seg-clear-btn" onclick="clearSegmentPhoto(${i})">清除</button>`;
      } else {
        slot.innerHTML = '';
        if (card) { card.classList.remove('matched'); card.classList.add('unmatched'); }
        if (meta) meta.innerHTML = `<span class="meta-tag unmatched"><i class="fas fa-image"></i> 將使用 Pexels 素材</span>`;
      }
    }
  }

  function clearSegmentPhoto(segIdx) {
    delete window._assignments[segIdx];
    updateSegmentPhotoSlots();
  }

  // ── Step 2: render ─────────────────────────────────────────────────────────
  async function renderVideo() {
    const workerUrl = getWorkerUrl();
    const category = window._category;
    const segments = Array.from({ length: 5 }, (_, i) => [
      $(`seg-text-${i}`).value.trim(),
      $(`seg-query-${i}`).value.trim(),
    ]);

    if (segments.some(s => !s[0] || !s[1])) {
      return showStatus('step2-status', '每個段落的文字和搜尋詞都必須填寫。', 'error');
    }

    $('render-btn').disabled = true;
    showStatus('step2-status', '正在上傳照片並觸發渲染...', 'info');

    // Build photos from AI assignments
    const photos = [];
    for (const [segIdxStr, photoIdx] of Object.entries(window._assignments || {})) {
      const photo = (window._uploadedPhotos || [])[photoIdx];
      if (photo) {
        photos.push({ index: parseInt(segIdxStr), data: photo.data, ext: photo.ext });
      }
    }

    let triggerTime;
    try {
      const res = await fetch(workerUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          segments_json: JSON.stringify(segments),
          category,
          photos: photos.length > 0 ? photos : undefined,
        }),
      });
      const data = await res.json();
      if (!res.ok || !data.triggered) {
        showStatus('step2-status', `觸發失敗：${data.error || res.status}`, 'error');
        $('render-btn').disabled = false;
        return;
      }
      triggerTime = data.trigger_time;
    } catch (e) {
      showStatus('step2-status', `連線失敗：${e.message}`, 'error');
      $('render-btn').disabled = false;
      return;
    }

    setStep(3);
    pollRun(triggerTime);
  }

  // ── Step 3: poll ───────────────────────────────────────────────────────────
  async function pollRun(triggerTime) {
    let runId = null, attempts = 0, elapsed = 0, runUrl = '';

    // Live elapsed timer — updates every second throughout
    const elapsedTimer = setInterval(() => {
      elapsed++;
      const m = Math.floor(elapsed / 60), s = String(elapsed % 60).padStart(2, '0');
      const timeStr = m > 0 ? `${m}分${s}秒` : `${elapsed}秒`;
      if (!runId) {
        showStatus('step3-status', `等待 Actions 啟動... ${timeStr}`, 'running');
      } else {
        const link = runUrl ? ` · <a href="${runUrl}" target="_blank">查看進度</a>` : '';
        showStatus('step3-status', `渲染中... ${timeStr}（約 10 分鐘）${link}`, 'running');
      }
    }, 1000);

    while (!runId && attempts < 15) {
      attempts++;
      await new Promise(r => setTimeout(r, 5000));
      try {
        const res = await fetch(
          `https://api.github.com/repos/${REPO}/actions/workflows/render.yml/runs?per_page=5`,
          { headers: { Accept: 'application/vnd.github+json' } }
        );
        const data = await res.json();
        const run = (data.workflow_runs || []).find(r => new Date(r.created_at) >= new Date(triggerTime));
        if (run) { runId = run.id; runUrl = run.html_url; }
      } catch {}
    }

    if (!runId) {
      clearInterval(elapsedTimer);
      showStatus('step3-status', '找不到 Actions run。<a href="https://github.com/' + REPO + '/actions" target="_blank">手動查看</a>', 'error');
      return;
    }

    while (true) {
      await new Promise(r => setTimeout(r, 15000));
      try {
        const res = await fetch(
          `https://api.github.com/repos/${REPO}/actions/runs/${runId}`,
          { headers: { Accept: 'application/vnd.github+json' } }
        );
        const run = await res.json();
        runUrl = run.html_url;
        if (run.status === 'completed') {
          clearInterval(elapsedTimer);
          if (run.conclusion === 'success') {
            await fetchRelease();
          } else {
            showStatus('step3-status', `渲染失敗 (${run.conclusion})。<a href="${run.html_url}" target="_blank">查看詳細</a>`, 'error');
          }
          return;
        }
      } catch {}
    }
  }

  async function fetchRelease() {
    await new Promise(r => setTimeout(r, 3000));
    try {
      const res = await fetch(
        `https://api.github.com/repos/${REPO}/releases/latest`,
        { headers: { Accept: 'application/vnd.github+json' } }
      );
      const rel = await res.json();
      const asset = (rel.assets || []).find(a => a.name.endsWith('.mp4'));
      showStatus('step3-status', '影片製作完成。', 'done');
      loadRecentVideos();
      const area = $('download-area');
      area.style.display = 'block';
      const link = $('download-link');
      if (asset) {
        link.href = asset.browser_download_url;
        link.textContent = `${asset.name} (${(asset.size/1024/1024).toFixed(1)}MB)`;
      } else {
        link.href = rel.html_url;
        link.textContent = '前往 Release 下載';
        link.target = '_blank';
      }
    } catch {
      showStatus('step3-status', '已完成。<a href="https://github.com/' + REPO + '/releases" target="_blank">前往下載</a>', 'done');
    }
  }

  function reset() {
    $('generate-btn').disabled = false;
    $('render-btn').disabled = false;
    $('download-area').style.display = 'none';
    setStep(1);
  }

  async function loadRecentVideos() {
    const list = $('video-list');
    try {
      const res = await fetch(
        `https://api.github.com/repos/${REPO}/releases?per_page=10`,
        { headers: { Accept: 'application/vnd.github+json' } }
      );
      const releases = await res.json();
      if (!Array.isArray(releases) || !releases.length) {
        list.innerHTML = '<span style="color:var(--text-muted);font-size:14px">尚無影片</span>';
        return;
      }
      list.innerHTML = releases.map(rel => {
        const asset = (rel.assets || []).find(a => a.name.endsWith('.mp4'));
        const date = rel.created_at ? rel.created_at.slice(0, 10) : '';
        const sizeTxt = asset ? ` (${(asset.size / 1024 / 1024).toFixed(1)}MB)` : '';
        const href = asset ? asset.browser_download_url : rel.html_url;
        const dlAttr = asset ? 'download' : 'target="_blank"';
        const label = asset ? asset.name : rel.name;
        return `<div class="video-item">
          <div class="video-item-info">
            <span class="video-item-name">${rel.name}</span>
            <span class="video-item-date">${date}</span>
          </div>
          <a href="${href}" class="${'video-item-dl'}" ${dlAttr}>下載${sizeTxt}</a>
        </div>`;
      }).join('');
    } catch {
      list.innerHTML = '<span style="color:var(--text-muted);font-size:14px">載入失敗</span>';
    }
  }

  loadRecentVideos();
</script>
</body>
</html>
