<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Video Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1a1a24;
      border: 1px solid #2a2a38;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 640px;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; color: #fff; }
    .subtitle { font-size: 13px; color: #555566; margin-bottom: 24px; }
    label { display: block; font-size: 13px; color: #8888aa; margin-bottom: 6px; margin-top: 16px; }
    textarea, input {
      width: 100%;
      background: #12121a;
      border: 1px solid #2a2a38;
      border-radius: 8px;
      color: #e8e8f0;
      padding: 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus, input:focus { border-color: #5555cc; }
    textarea { resize: vertical; min-height: 180px; line-height: 1.6; }
    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: #4444cc;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) { background: #5555dd; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status {
      margin-top: 20px;
      padding: 14px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      line-height: 1.6;
    }
    #status.running { background: #1a2a1a; border: 1px solid #2a4a2a; color: #88cc88; }
    #status.done    { background: #1a1a2a; border: 1px solid #3a3a6a; color: #aaaaff; }
    #status.error   { background: #2a1a1a; border: 1px solid #4a2a2a; color: #ff8888; }
    a.dl-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 20px;
      background: #225522;
      border: 1px solid #336633;
      border-radius: 8px;
      color: #88ff88;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }
    a.dl-btn:hover { background: #336633; }
    .hint { font-size: 12px; color: #555566; margin-top: 5px; }
    details { margin-top: 20px; }
    summary { font-size: 13px; color: #555588; cursor: pointer; }
    summary:hover { color: #8888cc; }
    .settings-body { margin-top: 12px; padding: 16px; background: #12121a; border-radius: 8px; border: 1px solid #2a2a38; }
  </style>
</head>
<body>
<div class="card">
  <h1>📹 Daily Video Generator</h1>
  <p class="subtitle">貼上任何文字，AI 自動生成短影片</p>

  <label>原始內容</label>
  <textarea id="raw-text" placeholder="貼上天氣報告、課程筆記、新聞摘要…任何文字都可以。AI 會自動判斷風格並生成腳本。"></textarea>

  <button id="submit-btn" onclick="submitJob()">🎬 生成影片</button>

  <div id="status"></div>

  <details id="settings-panel">
    <summary>⚙️ 設定（首次使用需填寫）</summary>
    <div class="settings-body">
      <label>Worker URL</label>
      <input id="worker-url" type="text" placeholder="https://daily-video-trigger.你的帳號.workers.dev">
      <p class="hint">Cloudflare Worker 的網址，用來安全地觸發 GitHub Actions。設定一次即可。</p>
      <button style="margin-top:12px; background:#333344; font-size:13px; padding:8px;" onclick="saveSettings()">儲存設定</button>
    </div>
  </details>
</div>

<script>
  const $ = id => document.getElementById(id);

  window.onload = () => {
    const url = localStorage.getItem('dv_worker_url');
    if (url) $('worker-url').value = url;
  };

  function saveSettings() {
    localStorage.setItem('dv_worker_url', $('worker-url').value.trim());
    setStatus('✅ 設定已儲存', 'done');
  }

  function setStatus(msg, type) {
    const el = $('status');
    el.style.display = 'block';
    el.className = type;
    el.innerHTML = msg;
  }

  async function submitJob() {
    const rawText = $('raw-text').value.trim();
    const workerUrl = ($('worker-url').value || localStorage.getItem('dv_worker_url') || '').trim();

    if (!rawText) return setStatus('請貼上原始文字內容。', 'error');
    if (!workerUrl) {
      $('settings-panel').open = true;
      return setStatus('請先在下方設定填入 Worker URL。', 'error');
    }

    $('submit-btn').disabled = true;
    setStatus('⏳ 觸發 GitHub Actions...', 'running');

    let triggerTime;
    try {
      const res = await fetch(workerUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ raw_text: rawText }),
      });
      const data = await res.json();
      if (!res.ok || !data.triggered) {
        setStatus(`❌ 觸發失敗：${data.error || res.status}`, 'error');
        $('submit-btn').disabled = false;
        return;
      }
      triggerTime = data.trigger_time;
    } catch (e) {
      setStatus(`❌ 無法連線到 Worker：${e.message}`, 'error');
      $('submit-btn').disabled = false;
      return;
    }

    setStatus('✅ 已觸發，等待 Actions 啟動（約 30 秒）...', 'running');
    await new Promise(r => setTimeout(r, 8000));
    pollRun(triggerTime);
  }

  async function pollRun(triggerTime) {
    const REPO = 'sorryxx18/daily-video';
    let runId = null;
    let attempts = 0;

    while (!runId && attempts < 15) {
      attempts++;
      await new Promise(r => setTimeout(r, 5000));
      try {
        const res = await fetch(
          `https://api.github.com/repos/${REPO}/actions/workflows/render.yml/runs?per_page=5`,
          { headers: { Accept: 'application/vnd.github+json' } }
        );
        const data = await res.json();
        const run = (data.workflow_runs || []).find(r =>
          new Date(r.created_at) >= new Date(triggerTime)
        );
        if (run) runId = run.id;
      } catch {}
    }

    if (!runId) {
      setStatus('❌ 找不到對應的 Actions run，請到 <a href="https://github.com/sorryxx18/daily-video/actions" target="_blank" style="color:#ff8888">GitHub Actions</a> 頁面查看。', 'error');
      $('submit-btn').disabled = false;
      return;
    }

    let elapsed = 0;
    const REPO = 'sorryxx18/daily-video';

    while (true) {
      elapsed += 15;
      await new Promise(r => setTimeout(r, 15000));
      try {
        const res = await fetch(
          `https://api.github.com/repos/${REPO}/actions/runs/${runId}`,
          { headers: { Accept: 'application/vnd.github+json' } }
        );
        const run = await res.json();
        const mins = Math.floor(elapsed / 60);
        const secs = elapsed % 60;

        if (run.status === 'completed') {
          if (run.conclusion === 'success') {
            await fetchRelease(REPO, runId);
          } else {
            setStatus(`❌ Actions 失敗 (${run.conclusion})。<br><a href="${run.html_url}" target="_blank" style="color:#ff8888">查看詳細</a>`, 'error');
            $('submit-btn').disabled = false;
          }
          return;
        }

        setStatus(`⏳ 渲染中... ${mins}分${secs}秒 (<a href="${run.html_url}" target="_blank" style="color:#88cc88">查看進度</a>)`, 'running');
      } catch {}
    }
  }

  async function fetchRelease(repo, runId) {
    await new Promise(r => setTimeout(r, 3000));
    try {
      const res = await fetch(
        `https://api.github.com/repos/${repo}/releases/latest`,
        { headers: { Accept: 'application/vnd.github+json' } }
      );
      const rel = await res.json();
      const asset = (rel.assets || []).find(a => a.name.endsWith('.mp4'));
      if (asset) {
        setStatus(
          `🎉 影片完成！<br><a class="dl-btn" href="${asset.browser_download_url}" download>⬇️ 下載影片 (${(asset.size/1024/1024).toFixed(1)}MB)</a>`,
          'done'
        );
      } else {
        setStatus(`✅ 完成！<a href="${rel.html_url}" target="_blank" style="color:#aaaaff">前往 Release 下載</a>`, 'done');
      }
    } catch {
      setStatus('✅ 渲染完成！<a href="https://github.com/' + repo + '/releases" target="_blank" style="color:#aaaaff">前往 Releases 下載</a>', 'done');
    }
    $('submit-btn').disabled = false;
  }
</script>
</body>
</html>
