<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>廢片生成所</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --border: #e5e7eb;
      --border-focus: #6366f1;
      --text: #111827;
      --muted: #6b7280;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --accent-light: #eef2ff;
      --success: #059669;
      --success-light: #ecfdf5;
      --error: #dc2626;
      --error-light: #fef2f2;
      --warning: #d97706;
      --warning-light: #fffbeb;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 16px 80px;
    }

    .container { max-width: 680px; margin: 0 auto; }

    /* Header */
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
    .header p { font-size: 15px; color: var(--muted); }

    /* Step indicator */
    .steps {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 32px;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      font-size: 13px;
      color: var(--muted);
    }
    .step.active { color: var(--accent); }
    .step.done { color: var(--success); }
    .step-num {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      flex-shrink: 0;
    }
    .step.active .step-num { border-color: var(--accent); background: var(--accent); color: #fff; }
    .step.done .step-num { border-color: var(--success); background: var(--success); color: #fff; }
    .step-divider { flex: 0 0 24px; height: 1px; background: var(--border); margin: 0 4px; }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .card-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; }

    /* Form elements */
    label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
    textarea, input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      resize: none;
    }
    textarea:focus, input[type="text"]:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(99,102,241,.1);
    }
    textarea { min-height: 160px; line-height: 1.6; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px; font-weight: 600;
      border: none; cursor: pointer;
      transition: background .15s, opacity .15s, transform .1s;
    }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-secondary { background: var(--accent-light); color: var(--accent); }
    .btn-secondary:hover:not(:disabled) { background: #e0e7ff; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover:not(:disabled) { background: #047857; }
    .btn-full { width: 100%; }

    /* Segment editor */
    .segments-list { display: flex; flex-direction: column; gap: 12px; }
    .segment-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }
    .segment-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .segment-num {
      font-size: 11px; font-weight: 700; color: var(--muted);
      background: var(--border);
      padding: 2px 8px; border-radius: 20px;
    }
    .segment-card textarea { min-height: 72px; font-size: 13px; background: #fff; }
    .segment-query { margin-top: 8px; }
    .segment-query input { font-size: 12px; background: #fff; }
    .query-label {
      font-size: 11px; color: var(--muted); margin-bottom: 4px;
    }

    /* Status */
    .status {
      padding: 12px 16px; border-radius: 8px;
      font-size: 14px; line-height: 1.6;
      display: none;
      margin-top: 12px;
    }
    .status.info    { background: var(--accent-light); color: var(--accent); border: 1px solid #c7d2fe; }
    .status.running { background: var(--warning-light); color: var(--warning); border: 1px solid #fde68a; }
    .status.done    { background: var(--success-light); color: var(--success); border: 1px solid #a7f3d0; }
    .status.error   { background: var(--error-light); color: var(--error); border: 1px solid #fecaca; }

    /* Download */
    .download-btn {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 10px; padding: 10px 20px;
      background: var(--success); color: #fff;
      border-radius: 8px; text-decoration: none;
      font-weight: 600; font-size: 14px;
      transition: background .15s;
    }
    .download-btn:hover { background: #047857; }

    /* Category badge */
    .category-badge {
      display: inline-block;
      background: var(--accent-light); color: var(--accent);
      padding: 3px 10px; border-radius: 20px;
      font-size: 13px; font-weight: 600;
    }

    /* Settings */
    details { margin-top: 16px; }
    summary { font-size: 13px; color: var(--muted); cursor: pointer; user-select: none; }
    summary:hover { color: var(--accent); }
    .settings-body { margin-top: 12px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }

    /* Divider */
    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    /* Hidden */
    .hidden { display: none !important; }

    /* Batch photo upload */
    .batch-upload-zone {
      border: 2px dashed var(--border); border-radius: 8px;
      padding: 16px; text-align: center; cursor: pointer;
      margin-bottom: 12px; transition: border-color .15s, background .15s;
    }
    .batch-upload-zone:hover { border-color: var(--accent); background: var(--accent-light); }
    .batch-upload-label { cursor: pointer; display: block; }
    .batch-upload-label span { display: block; }
    .batch-upload-label span:first-child { font-size: 14px; font-weight: 600; color: var(--text); }
    .batch-hint { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .photo-grid {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px;
    }
    .photo-thumb-item {
      position: relative; width: 64px; height: 64px;
    }
    .photo-thumb-item img {
      width: 64px; height: 64px; object-fit: cover;
      border-radius: 7px; border: 2px solid var(--border);
    }
    .photo-thumb-num {
      position: absolute; top: 2px; left: 4px;
      font-size: 10px; font-weight: 700; color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }
    .seg-photo-slot {
      margin-top: 8px; display: flex; align-items: center; gap: 8px;
      min-height: 36px;
    }
    .seg-photo-slot img {
      width: 48px; height: 48px; object-fit: cover;
      border-radius: 6px; border: 1px solid var(--border);
    }
    .no-photo-label {
      font-size: 11px; color: var(--muted);
      background: var(--bg); border: 1px dashed var(--border);
      border-radius: 6px; padding: 4px 10px;
    }
    .seg-clear-btn {
      font-size: 11px; color: var(--error); background: none;
      border: none; cursor: pointer; padding: 0; margin-left: 4px;
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>🎬 廢片生成所</h1>
    <p>貼上任何文字，AI 生成腳本，一鍵渲染影片</p>
  </div>

  <!-- Steps -->
  <div class="steps">
    <div class="step active" id="step1-indicator">
      <div class="step-num">1</div>
      <span>輸入內容</span>
    </div>
    <div class="step-divider"></div>
    <div class="step" id="step2-indicator">
      <div class="step-num">2</div>
      <span>確認腳本</span>
    </div>
    <div class="step-divider"></div>
    <div class="step" id="step3-indicator">
      <div class="step-num">3</div>
      <span>渲染下載</span>
    </div>
  </div>

  <!-- Step 1: Input -->
  <div id="step1">
    <div class="card">
      <div class="card-title">原始內容</div>
      <textarea id="raw-text" placeholder="貼上天氣報告、課程筆記、新聞摘要…任何文字都可以。"></textarea>
      <div style="margin-top:12px">
        <button class="btn btn-primary btn-full" id="generate-btn" onclick="generateScript()">
          ✨ 生成腳本
        </button>
      </div>
      <div class="status" id="step1-status"></div>
    </div>

  </div>

  <!-- Step 2: Script editor -->
  <div id="step2" class="hidden">
    <div class="card">
      <div class="card-title" style="display:flex;align-items:center;justify-content:space-between">
        <span>確認腳本</span>
        <span class="category-badge" id="category-badge"></span>
      </div>
      <!-- Batch photo upload -->
      <div class="batch-upload-zone" onclick="$('batch-photo-input').click()">
        <label class="batch-upload-label">
          <span>📷 上傳照片（可多選）</span>
          <span class="batch-hint">AI 自動配對到最合適的段落</span>
        </label>
      </div>
      <input type="file" id="batch-photo-input" accept="image/*" multiple style="display:none" onchange="handleBatchUpload(this)">
      <div id="photo-grid" class="photo-grid hidden"></div>
      <button class="btn btn-secondary" id="assign-btn" onclick="assignPhotos()" style="display:none;margin-bottom:12px;width:100%">🤖 AI 自動配對照片</button>

      <div class="segments-list" id="segments-list"></div>
      <div class="divider"></div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-secondary" onclick="backToStep1()" style="flex:1">← 重新輸入</button>
        <button class="btn btn-success" onclick="renderVideo()" style="flex:2" id="render-btn">
          🎬 確認渲染
        </button>
      </div>
      <div class="status" id="step2-status"></div>
    </div>
  </div>

  <!-- Step 3: Progress & download -->
  <div id="step3" class="hidden">
    <div class="card">
      <div class="card-title">渲染進度</div>
      <div class="status running" id="step3-status" style="display:block">⏳ 等待 Actions 啟動...</div>
      <div id="download-area" style="margin-top:12px;display:none">
        <a id="download-link" class="download-btn" download>⬇️ 下載影片</a>
        <div style="margin-top:12px">
          <button class="btn btn-secondary" onclick="reset()">重新製作</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  const $ = id => document.getElementById(id);
  const REPO = 'sorryxx18/daily-video';


  function showStatus(id, msg, type) {
    const el = $(id);
    el.style.display = 'block';
    el.className = `status ${type}`;
    el.innerHTML = msg;
  }

  function hideStatus(id) {
    $(id).style.display = 'none';
  }

  function setStep(n) {
    ['step1','step2','step3'].forEach((id, i) => {
      $(id).classList.toggle('hidden', i !== n - 1);
    });
    [1,2,3].forEach(i => {
      const el = $(`step${i}-indicator`);
      el.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
    });
  }

  function getWorkerUrl() {
    return 'https://daily-video-trigger.sorryxx18.workers.dev';
  }

  // ── Step 1: generate script ────────────────────────────────────────────────
  async function generateScript() {
    const rawText = $('raw-text').value.trim();
    if (!rawText) return showStatus('step1-status', '請貼上原始文字內容。', 'error');

    const workerUrl = getWorkerUrl();
    $('generate-btn').disabled = true;
    showStatus('step1-status', '✨ AI 生成腳本中...', 'info');

    try {
      const res = await fetch(workerUrl + '/preview', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ raw_text: rawText }),
      });
      const data = await res.json();

      if (!res.ok || !data.segments) {
        showStatus('step1-status', `❌ 生成失敗：${data.error || res.status}`, 'error');
        $('generate-btn').disabled = false;
        return;
      }

      renderScriptEditor(data.category, data.segments);
      setStep(2);
      hideStatus('step1-status');

    } catch (e) {
      showStatus('step1-status', `❌ 無法連線到 Worker：${e.message}`, 'error');
      $('generate-btn').disabled = false;
    }
  }

  function renderScriptEditor(category, segments) {
    $('category-badge').textContent = category;
    window._category = category;
    window._segments = segments;
    window._uploadedPhotos = [];
    window._assignments = {};

    // Reset photo UI
    $('photo-grid').innerHTML = '';
    $('photo-grid').classList.add('hidden');
    $('assign-btn').style.display = 'none';
    $('batch-photo-input').value = '';

    const list = $('segments-list');
    list.innerHTML = '';
    segments.forEach((seg, i) => {
      const div = document.createElement('div');
      div.className = 'segment-card';
      div.innerHTML = `
        <div class="segment-header">
          <span class="segment-num">段落 ${i+1}</span>
        </div>
        <textarea id="seg-text-${i}" rows="3">${seg[0]}</textarea>
        <div class="segment-query">
          <div class="query-label">Pexels 搜尋詞</div>
          <input type="text" id="seg-query-${i}" value="${seg[1]}">
        </div>
        <div class="seg-photo-slot" id="seg-photo-${i}">
          <span class="no-photo-label">🎬 自動找影片</span>
        </div>`;
      list.appendChild(div);
    });
  }

  function backToStep1() {
    $('generate-btn').disabled = false;
    setStep(1);
  }

  async function handleBatchUpload(input) {
    const files = Array.from(input.files);
    if (!files.length) return;
    window._uploadedPhotos = [];
    window._assignments = {};

    const grid = $('photo-grid');
    grid.innerHTML = '';
    grid.classList.remove('hidden');

    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      const objectUrl = URL.createObjectURL(file);
      // Resize to max 512px for AI (speeds up Gemini Vision significantly)
      const data = await new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const MAX = 512;
          let w = img.width, h = img.height;
          if (w > MAX || h > MAX) {
            if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
            else { w = Math.round(w * MAX / h); h = MAX; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.8));
        };
        img.src = objectUrl;
      });
      const ext = 'jpg';
      window._uploadedPhotos.push({ data, ext, objectUrl });

      const item = document.createElement('div');
      item.className = 'photo-thumb-item';
      item.innerHTML = `<img src="${objectUrl}" alt="照片 ${i}"><span class="photo-thumb-num">${i}</span>`;
      grid.appendChild(item);
    }

    $('assign-btn').style.display = 'block';
    updateSegmentPhotoSlots();
  }

  async function assignPhotos() {
    if (!window._uploadedPhotos.length) return;
    const workerUrl = getWorkerUrl();
    const segments = Array.from({ length: 5 }, (_, i) => [
      $(`seg-text-${i}`).value.trim(),
      $(`seg-query-${i}`).value.trim(),
    ]);

    $('assign-btn').disabled = true;
    $('assign-btn').textContent = '🤖 AI 配對中...';

    try {
      const res = await fetch(workerUrl + '/assign', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          segments,
          photos: window._uploadedPhotos.map(p => ({ data: p.data, ext: p.ext })),
        }),
      });
      const result = await res.json();
      if (!res.ok || !result.assignments) {
        showStatus('step2-status', `❌ AI 配對失敗：${result.error || res.status}`, 'error');
        return;
      }
      window._assignments = result.assignments;
      updateSegmentPhotoSlots();
      showStatus('step2-status', '✅ 配對完成！可在各段落確認。', 'done');
    } catch (e) {
      showStatus('step2-status', `❌ 連線失敗：${e.message}`, 'error');
    } finally {
      $('assign-btn').disabled = false;
      $('assign-btn').textContent = '🤖 AI 自動配對照片';
    }
  }

  function updateSegmentPhotoSlots() {
    for (let i = 0; i < 5; i++) {
      const slot = $(`seg-photo-${i}`);
      if (!slot) continue;
      const photoIdx = window._assignments[i];
      const photo = (photoIdx !== undefined) ? window._uploadedPhotos[photoIdx] : null;
      if (photo) {
        slot.innerHTML = `<img src="${photo.objectUrl}" alt="段落${i+1}照片"><span style="font-size:12px;color:var(--muted)">照片 ${photoIdx}</span><button class="seg-clear-btn" onclick="clearSegmentPhoto(${i})">✕ 清除</button>`;
      } else {
        slot.innerHTML = '<span class="no-photo-label">🎬 自動找影片</span>';
      }
    }
  }

  function clearSegmentPhoto(segIdx) {
    delete window._assignments[segIdx];
    updateSegmentPhotoSlots();
  }

  // ── Step 2: render ─────────────────────────────────────────────────────────
  async function renderVideo() {
    const workerUrl = getWorkerUrl();
    const category = window._category;
    const segments = Array.from({ length: 5 }, (_, i) => [
      $(`seg-text-${i}`).value.trim(),
      $(`seg-query-${i}`).value.trim(),
    ]);

    if (segments.some(s => !s[0] || !s[1])) {
      return showStatus('step2-status', '每個段落的文字和搜尋詞都必須填寫。', 'error');
    }

    $('render-btn').disabled = true;
    showStatus('step2-status', '⏳ 上傳照片並觸發渲染中...', 'info');

    // Build photos from AI assignments
    const photos = [];
    for (const [segIdxStr, photoIdx] of Object.entries(window._assignments || {})) {
      const photo = (window._uploadedPhotos || [])[photoIdx];
      if (photo) {
        photos.push({ index: parseInt(segIdxStr), data: photo.data, ext: photo.ext });
      }
    }

    let triggerTime;
    try {
      const res = await fetch(workerUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          segments_json: JSON.stringify(segments),
          category,
          photos: photos.length > 0 ? photos : undefined,
        }),
      });
      const data = await res.json();
      if (!res.ok || !data.triggered) {
        showStatus('step2-status', `❌ 觸發失敗：${data.error || res.status}`, 'error');
        $('render-btn').disabled = false;
        return;
      }
      triggerTime = data.trigger_time;
    } catch (e) {
      showStatus('step2-status', `❌ 連線失敗：${e.message}`, 'error');
      $('render-btn').disabled = false;
      return;
    }

    setStep(3);
    await new Promise(r => setTimeout(r, 8000));
    pollRun(triggerTime);
  }

  // ── Step 3: poll ───────────────────────────────────────────────────────────
  async function pollRun(triggerTime) {
    let runId = null, attempts = 0;

    while (!runId && attempts < 15) {
      attempts++;
      await new Promise(r => setTimeout(r, 5000));
      try {
        const res = await fetch(
          `https://api.github.com/repos/${REPO}/actions/workflows/render.yml/runs?per_page=5`,
          { headers: { Accept: 'application/vnd.github+json' } }
        );
        const data = await res.json();
        const run = (data.workflow_runs || []).find(r => new Date(r.created_at) >= new Date(triggerTime));
        if (run) runId = run.id;
      } catch {}
    }

    if (!runId) {
      showStatus('step3-status', '❌ 找不到 Actions run。<a href="https://github.com/' + REPO + '/actions" target="_blank">手動查看</a>', 'error');
      return;
    }

    let elapsed = 0;
    while (true) {
      elapsed += 15;
      await new Promise(r => setTimeout(r, 15000));
      try {
        const res = await fetch(
          `https://api.github.com/repos/${REPO}/actions/runs/${runId}`,
          { headers: { Accept: 'application/vnd.github+json' } }
        );
        const run = await res.json();
        const m = Math.floor(elapsed / 60), s = elapsed % 60;

        if (run.status === 'completed') {
          if (run.conclusion === 'success') {
            await fetchRelease();
          } else {
            showStatus('step3-status', `❌ 渲染失敗 (${run.conclusion})。<a href="${run.html_url}" target="_blank">查看詳細</a>`, 'error');
          }
          return;
        }
        showStatus('step3-status', `⏳ 渲染中... ${m}分${s}秒 · <a href="${run.html_url}" target="_blank">查看進度</a>`, 'running');
      } catch {}
    }
  }

  async function fetchRelease() {
    await new Promise(r => setTimeout(r, 3000));
    try {
      const res = await fetch(
        `https://api.github.com/repos/${REPO}/releases/latest`,
        { headers: { Accept: 'application/vnd.github+json' } }
      );
      const rel = await res.json();
      const asset = (rel.assets || []).find(a => a.name.endsWith('.mp4'));
      showStatus('step3-status', '🎉 影片製作完成！', 'done');
      const area = $('download-area');
      area.style.display = 'block';
      const link = $('download-link');
      if (asset) {
        link.href = asset.browser_download_url;
        link.textContent = `⬇️ 下載影片 (${(asset.size/1024/1024).toFixed(1)}MB)`;
      } else {
        link.href = rel.html_url;
        link.textContent = '⬇️ 前往 Release 下載';
        link.target = '_blank';
      }
    } catch {
      showStatus('step3-status', '✅ 完成！<a href="https://github.com/' + REPO + '/releases" target="_blank">前往下載</a>', 'done');
    }
  }

  function reset() {
    $('generate-btn').disabled = false;
    $('render-btn').disabled = false;
    $('download-area').style.display = 'none';
    setStep(1);
  }
</script>
</body>
</html>
